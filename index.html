<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="img-container">
        <div>
            <h1>Give Me Money!</h1>
        </div>
    </div>
    <div class="form-section-container">
        <div>
            <p class="info">
                This is a fake service.
                You can give me your money and get absolutely nothing in return.
                <strong>Sign up today!</strong>
            </p>
        </div>
        <form action="" id="create-account">
            <h2>Prepare to be scammed!</h2>
            <div class="form-row">
                <div class="input-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name">
                </div>
                <div class="input-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name">
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="email">email</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" minlength="10">
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" minlength="8">
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" minlength="8">
                </div>
            </div>
        </form>
        <div>
            <button form="create-account" type="submit">Create Account</button>
            <p>Already have an account? <a href="">Log in</a></p>
        </div>
    </div>
</body>
</html>
